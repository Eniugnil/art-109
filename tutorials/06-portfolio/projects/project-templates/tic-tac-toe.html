<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTT</title>
    <link rel="stylesheet" href="../../css/tic-tac-toe.css" />
    <script src="../../js/tic-tac-toe.js" defer></script>
  </head>
  
  <body>
    <header class="header">
      <div>Tic Tac Toe</div>
    </header>

    <main class="main-content">   
      <div id="board">
        <div class="cell" onclick="runGame(this, '0', '0')">1</div>
        <div class="cell" onclick="runGame(this, '0', '1')">2</div>
        <div class="cell" onclick="runGame(this, '0', '2')">3</div>
        <div class="cell" onclick="runGame(this, '1', '0')">4</div>
        <div class="cell" onclick="runGame(this, '1', '1')">5</div>
        <div class="cell" onclick="runGame(this, '1', '2')">6</div>
        <div class="cell" onclick="runGame(this, '2', '0')">7</div>
        <div class="cell" onclick="runGame(this, '2', '1')">8</div>
        <div class="cell" onclick="runGame(this, '2', '2')">9</div>
      </div>
      <button class="open-button">Open</button>
      <dialog>
        <div class="game-result"></div>
        <button class="reset-button">Reset</button>

      </dialog>
    </main>

    <footer class="footer">
      <a href="../../index.html"><button>Back to Home</button></a>
    </footer>

  </body>
</html>
